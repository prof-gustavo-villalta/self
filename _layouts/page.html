---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    {% if page.date %}
    <p class="post-meta">
      <i class="far fa-calendar"></i>
      <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%d/%m/%Y" }}
      </time>
    </p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
